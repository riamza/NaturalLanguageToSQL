version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: naturallanguage-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: NlToSQL
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: naturallanguage-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=NlToSQL;Username=postgres;Password=postgrespassword
      # Add your API key securely later, or inject it via .env file
      - Llm__ApiKey=${LLM_API_KEY:-YOUR_API_KEY_HERE}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: naturallanguage-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: