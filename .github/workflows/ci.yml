name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    name: Build Backend (.NET)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      working-directory: ./backend
      run: dotnet restore NlToSqlAssistant.sln

    - name: Build
      working-directory: ./backend
      run: dotnet build NlToSqlAssistant.sln --configuration Release --no-restore

    # Example test runner stub (if unit tests project is added later)
    # - name: Test
    #   working-directory: ./backend
    #   run: dotnet test NlToSqlAssistant.sln --configuration Release --no-build --verbosity normal

  build-frontend:
    name: Build Frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build