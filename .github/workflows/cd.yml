name: CD Pipeline (Docker Built)

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers when pushing tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from GH UI

# Only necessary if you plan to publish images e.g. to GitHub Container Registry or Docker Hub
# env:
#   DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
#   DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-and-push-docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Example: Login to DockerHub (Uncomment if using)
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ env.DOCKER_USERNAME }}
      #     password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false # Set to true to push the image up to a registry
          tags: nltosql-frontend:latest, nltosql-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false # Set to true to push the image up to a registry
          tags: nltosql-backend:latest, nltosql-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      # If you were deploying, you could add steps here (e.g. helm upgrade, SSH to a VPS running docker-compose, or deploy to Azure/AWS/Render)
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/apps/NaturalLanguageToSQL
            cd ~/apps/NaturalLanguageToSQL
            if [ ! -d ".git" ]; then
              git clone https://github.com/riamza/NaturalLanguageToSQL.git .
            else
              git pull origin main
            fi
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d